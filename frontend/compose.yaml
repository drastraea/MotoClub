# Works with both `docker compose` and `podman compose`.
# Start with: podman compose up --build -d   →   http://localhost:3000
#
# Configure the backend hostname and Google client per environment via the
# host environment (defaults target local dev):
#   NEXT_PUBLIC_API_URL=https://api.motoclub.example \
#   NEXT_PUBLIC_GOOGLE_CLIENT_ID=xxxx.apps.googleusercontent.com \
#   podman compose up --build -d
services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8080}"
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: "${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
