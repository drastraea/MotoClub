# MotoClub backend configuration — one section per environment.
#
# Select the active section with APP_ENV (default: local). Values support
# ${VAR} interpolation from the process environment, so production secrets can
# stay out of source control and be injected at deploy time.

local:
  port: "8080"
  database:
    host: db
    port: 5432
    user: motoclub
    password: motoclub
    name: motoclub
    sslmode: disable
  jwt_secret: dev-secret-change-me
  google_client_id: "407408718192.apps.googleusercontent.com"
  token_ttl_hours: 24
  cors_allowed_origins:
    - http://localhost:3000
  log:
    level: info
    format: json

production:
  port: "${PORT}"
  database:
    # Provide either a full url, or the discrete host/user/password/name fields.
    url: "${DATABASE_URL}"
  jwt_secret: "${JWT_SECRET}"
  google_client_id: "${GOOGLE_CLIENT_ID}"
  token_ttl_hours: 24
  cors_allowed_origins:
    - "${FRONTEND_ORIGIN}"
  log:
    level: "${LOG_LEVEL}"
    format: json
