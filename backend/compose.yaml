# Works with both `docker compose` and `podman compose`.
services:
  db:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: motoclub
      POSTGRES_PASSWORD: motoclub
      POSTGRES_DB: motoclub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motoclub -d motoclub"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    entrypoint: ["/goose", "-dir", "/db/migrations", "up"]
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "postgres://motoclub:motoclub@db:5432/motoclub?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    environment:
      # All app settings (DB credentials, JWT secret, Google client, CORS, log)
      # live in config.yaml under this environment's section. In production,
      # config.yaml references ${VAR} for these, so they must be forwarded
      # from the host into the container here.
      APP_ENV: "${APP_ENV:-local}"
      TZ: "Asia/Jakarta"
      PORT: "${PORT:-}"
      DATABASE_URL: "${DATABASE_URL:-}"
      JWT_SECRET: "${JWT_SECRET:-}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      FRONTEND_ORIGIN: "${FRONTEND_ORIGIN:-}"
      LOG_LEVEL: "${LOG_LEVEL:-}"
    ports:
      - "8080:8080"
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  uploads:
