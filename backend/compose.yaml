# Works with both `docker compose` and `podman compose`.
services:
  db:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: motoclub
      POSTGRES_PASSWORD: motoclub
      POSTGRES_DB: motoclub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motoclub -d motoclub"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    entrypoint: ["/goose", "-dir", "/db/migrations", "up"]
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "postgres://motoclub:motoclub@db:5432/motoclub?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://motoclub:motoclub@db:5432/motoclub?sslmode=disable"
      JWT_SECRET: "dev-secret-change-me"
      GOOGLE_CLIENT_ID: "dev-google-client-id.apps.googleusercontent.com"
      TZ: "Asia/Jakarta"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
